<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛒 Gestor de Inventario</title>
  <style>
    /* --- ESTILOS COMPLETOS --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    #root {
      width: 100%;
      max-width: 900px;
    }

    /* Contenedor principal */
    .inventory-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      color: #e8e8f0;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .inventory-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-left h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #7b61ff, #00e5c0);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-subtitle {
      font-size: 0.85rem;
      color: #6b6b80;
    }

    /* Stats */
    .stats-grid {
      display: flex;
      gap: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.75rem 1.5rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .stat-icon { font-size: 1.5rem; }
    .stat-value { font-size: 1.2rem; font-weight: 700; color: white; }
    .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #6b6b80; }

    /* Inputs y botones */
    .input-group {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .product-input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border-radius: 14px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #e8e8f0;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .product-input:focus {
      border-color: #7b61ff;
      box-shadow: 0 0 0 4px rgba(123, 97, 255, 0.1);
    }

    .product-input::placeholder { color: #6b6b80; }

    .search-section {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 1.2rem;
      border-radius: 14px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #e8e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-input:focus {
      border-color: #00e5c0;
      box-shadow: 0 0 0 4px rgba(0, 229, 192, 0.1);
    }

    .search-results {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      color: #6b6b80;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7b61ff, #6a4fff);
      color: white;
      box-shadow: 0 4px 16px rgba(123, 97, 255, 0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(123, 97, 255, 0.4); }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #e8e8f0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.12); }
    .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.25); transform: translateY(-2px); }

    /* Lista de productos */
    .product-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin: 1.5rem 0;
      max-height: 450px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .product-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1.2rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .product-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(123, 97, 255, 0.2);
    }

    .product-name { font-weight: 600; font-size: 1.05rem; }
    .product-badges { display: flex; gap: 0.5rem; }

    .stock-badge {
      font-size: 0.65rem;
      padding: 0.15rem 0.6rem;
      border-radius: 12px;
      font-weight: 500;
    }
    .stock-badge.low { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .stock-badge.medium { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.2); }
    .stock-badge.high { background: rgba(52, 211, 153, 0.15); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.2); }

    .product-quantity-control {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .quantity-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 3rem;
    }
    .quantity-number { font-size: 1.2rem; font-weight: 700; }
    .quantity-label { font-size: 0.55rem; text-transform: uppercase; color: #6b6b80; }

    .product-actions { display: flex; gap: 0.4rem; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #6b6b80;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .empty-icon { font-size: 3rem; opacity: 0.5; }

    .inventory-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .actions-left, .actions-right { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    @media (max-width: 768px) {
      .inventory-container { padding: 1.25rem; }
      .inventory-header { flex-direction: column; align-items: stretch; }
      .stats-grid { justify-content: space-around; }
      .stat-item { flex-direction: column; align-items: center; text-align: center; gap: 0.25rem; }
      .input-group { flex-direction: column; }
      .btn-primary { justify-content: center; }
      .product-item { flex-direction: column; align-items: stretch; }
      .product-quantity-control { justify-content: space-between; }
      .inventory-actions { flex-direction: column; align-items: stretch; }
      .actions-left, .actions-right { justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // --- REACT Y REACTDOM (desde CDN) ---
    // Cargamos React y ReactDOM desde un CDN para que funcione sin build
    const reactScript = document.createElement('script');
    reactScript.src = 'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js';
    reactScript.crossOrigin = 'anonymous';
    document.head.appendChild(reactScript);

    const reactDomScript = document.createElement('script');
    reactDomScript.src = 'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js';
    reactDomScript.crossOrigin = 'anonymous';
    document.head.appendChild(reactDomScript);

    // --- LÓGICA DE LA APLICACIÓN ---
    // Esperamos a que ReactDOM esté disponible para montar la app
    function waitForReact() {
      if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
        setTimeout(waitForReact, 100);
        return;
      }

      // --- COMPONENTE PRINCIPAL ---
      function App() {
        const [state, dispatch] = React.useReducer(reducer, initialState, () => {
          const saved = localStorage.getItem('inventory');
          return saved ? JSON.parse(saved) : initialState;
        });

        React.useEffect(() => {
          localStorage.setItem('inventory', JSON.stringify(state));
        }, [state]);

        const inputRef = React.useRef(null);
        const [searchTerm, setSearchTerm] = React.useState('');

        const handleAddProduct = React.useCallback(() => {
          const value = inputRef.current.value;
          if (value.trim() !== '') {
            dispatch({ type: 'add', name: value.trim() });
            inputRef.current.value = '';
            inputRef.current.focus();
          }
        }, []);

        const handleIncrement = React.useCallback((id) => {
          dispatch({ type: 'increment', id });
        }, []);

        const handleDecrement = React.useCallback((id) => {
          dispatch({ type: 'decrement', id });
        }, []);

        const handleRemove = React.useCallback((id) => {
          if (confirm('¿Eliminar este producto del inventario?')) {
            dispatch({ type: 'remove', id });
          }
        }, []);

        const handleClear = React.useCallback(() => {
          if (state.products.length > 0 && confirm('⚠️ ¿Seguro que quieres vaciar todo el inventario?')) {
            dispatch({ type: 'clear' });
          }
        }, [state.products]);

        const handleReset = React.useCallback(() => {
          if (confirm('🔄 ¿Restaurar los productos de ejemplo?')) {
            dispatch({ type: 'reset' });
          }
        }, []);

        const filteredProducts = state.products.filter(p =>
          p.name.toLowerCase().includes(searchTerm.toLowerCase())
        );

        const totalProducts = state.products.length;
        const totalItems = state.products.reduce((sum, p) => sum + p.quantity, 0);
        const lowStock = state.products.filter(p => p.quantity <= 3).length;

        return React.createElement('div', { className: 'inventory-container' },
          // Header
          React.createElement('header', { className: 'inventory-header' },
            React.createElement('div', { className: 'header-left' },
              React.createElement('h1', null, '🛒 Gestor de Inventario'),
              React.createElement('p', { className: 'header-subtitle' }, 'Administra tus productos eficientemente')
            ),
            React.createElement('div', { className: 'stats-grid' },
              React.createElement('div', { className: 'stat-item' },
                React.createElement('span', { className: 'stat-icon' }, '📦'),
                React.createElement('div', null,
                  React.createElement('span', { className: 'stat-value' }, totalProducts),
                  React.createElement('span', { className: 'stat-label' }, 'Productos')
                )
              ),
              React.createElement('div', { className: 'stat-item' },
                React.createElement('span', { className: 'stat-icon' }, '📊'),
                React.createElement('div', null,
                  React.createElement('span', { className: 'stat-value' }, totalItems),
                  React.createElement('span', { className: 'stat-label' }, 'Total Unidades')
                )
              ),
              React.createElement('div', { className: 'stat-item' },
                React.createElement('span', { className: 'stat-icon' }, '⚠️'),
                React.createElement('div', null,
                  React.createElement('span', { className: 'stat-value' }, lowStock),
                  React.createElement('span', { className: 'stat-label' }, 'Stock Bajo')
                )
              )
            )
          ),
          // Agregar producto
          React.createElement('div', { className: 'input-group' },
            React.createElement('input', {
              ref: inputRef,
              type: 'text',
              placeholder: '📝 Nombre del producto...',
              className: 'product-input',
              onKeyDown: (e) => e.key === 'Enter' && handleAddProduct()
            }),
            React.createElement('button', { onClick: handleAddProduct, className: 'btn btn-primary' },
              '➕ Agregar'
            )
          ),
          // Buscador
          React.createElement('div', { className: 'search-section' },
            React.createElement('input', {
              type: 'text',
              placeholder: '🔍 Buscar productos...',
              value: searchTerm,
              onChange: (e) => setSearchTerm(e.target.value),
              className: 'search-input'
            }),
            React.createElement('span', { className: 'search-results' },
              `${filteredProducts.length} de ${totalProducts} productos`
            )
          ),
          // Lista de productos
          React.createElement('div', { className: 'product-list' },
            filteredProducts.length === 0 ?
              React.createElement('div', { className: 'empty-state' },
                React.createElement('span', { className: 'empty-icon' }, searchTerm ? '🔍' : '📭'),
                React.createElement('p', null,
                  searchTerm ?
                    `No se encontraron productos para "${searchTerm}"` :
                    'No hay productos en el inventario'
                ),
                !searchTerm && React.createElement('button', { onClick: handleReset, className: 'btn btn-secondary' },
                  '📥 Cargar productos de ejemplo'
                )
              ) :
              filteredProducts.map((product) => {
                const stockClass = product.quantity <= 3 ? 'low' : product.quantity >= 10 ? 'high' : 'medium';
                const stockText = product.quantity <= 3 ? '⚠️ Stock Bajo' :
                                 product.quantity >= 10 ? '✅ Stock Alto' :
                                 '📦 Stock Medio';
                return React.createElement('div', { key: product.id, className: 'product-item' },
                  React.createElement('div', { className: 'product-info' },
                    React.createElement('span', { className: 'product-name' }, product.name),
                    React.createElement('div', { className: 'product-badges' },
                      React.createElement('span', { className: `stock-badge ${stockClass}` }, stockText)
                    )
                  ),
                  React.createElement('div', { className: 'product-quantity-control' },
                    React.createElement('div', { className: 'quantity-display' },
                      React.createElement('span', { className: 'quantity-number' }, product.quantity),
                      React.createElement('span', { className: 'quantity-label' }, 'unidades')
                    ),
                    React.createElement('div', { className: 'product-actions' },
                      React.createElement('button', {
                        onClick: () => handleDecrement(product.id),
                        className: 'btn btn-secondary',
                        disabled: product.quantity <= 1
                      }, '➖'),
                      React.createElement('button', {
                        onClick: () => handleIncrement(product.id),
                        className: 'btn btn-secondary'
                      }, '➕'),
                      React.createElement('button', {
                        onClick: () => handleRemove(product.id),
                        className: 'btn btn-danger'
                      }, '🗑️')
                    )
                  )
                );
              })
          ),
          // Acciones
          React.createElement('div', { className: 'inventory-actions' },
            React.createElement('div', { className: 'actions-left' },
              state.products.length > 0 && [
                React.createElement('button', { key: 'clear', onClick: handleClear, className: 'btn btn-danger' },
                  '🧹 Vaciar Inventario'
                ),
                React.createElement('button', { key: 'reset', onClick: handleReset, className: 'btn btn-secondary' },
                  '🔄 Restaurar Ejemplos'
                )
              ]
            ),
            React.createElement('div', { className: 'actions-right' },
              React.createElement('button', {
                onClick: () => { setSearchTerm(''); inputRef.current?.focus(); },
                className: 'btn btn-secondary'
              }, '🔍 Limpiar Búsqueda')
            )
          )
        );
      }

      // --- REDUCER ---
      const initialProducts = [
        { id: 1, name: 'Laptop Gaming', quantity: 5 },
        { id: 2, name: 'Mouse Inalámbrico', quantity: 12 },
        { id: 3, name: 'Teclado Mecánico', quantity: 8 },
        { id: 4, name: 'Monitor 4K', quantity: 3 },
        { id: 5, name: 'Auriculares Bluetooth', quantity: 15 },
        { id: 6, name: 'Disco SSD 1TB', quantity: 7 },
        { id: 7, name: 'Cámara Web HD', quantity: 6 },
        { id: 8, name: 'Base Refrigerante', quantity: 4 }
      ];

      const initialState = { products: initialProducts };

      function reducer(state, action) {
        switch (action.type) {
          case 'add':
            return { products: [...state.products, { id: Date.now(), name: action.name.trim(), quantity: 1 }] };
          case 'increment':
            return { products: state.products.map(p => p.id === action.id ? { ...p, quantity: p.quantity + 1 } : p) };
          case 'decrement':
            return { products: state.products.map(p => p.id === action.id && p.quantity > 1 ? { ...p, quantity: p.quantity - 1 } : p) };
          case 'remove':
            return { products: state.products.filter(p => p.id !== action.id) };
          case 'clear':
            return { products: [] };
          case 'reset':
            return { products: initialProducts };
          default:
            return state;
        }
      }

      // --- MONTAJE DE LA APP ---
      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(React.createElement(App));
    }

    // Iniciar la espera para que React esté listo
    waitForReact();
  </script>
</body>
</html>
